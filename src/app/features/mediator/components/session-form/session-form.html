<div class="card p-4 bg-light">
  <h4 class="mb-3 text-secondary">Agendar Nueva Sesión de Mediación</h4>

  <form (ngSubmit)="guardarSesion()">
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label font-weight-bold">Fecha</label>
        <input
          type="date"
          class="form-control"
          [(ngModel)]="sesion.scheduledDate"
          name="scheduledDate"
          required
        />
      </div>

      <div class="col-md-6 mb-3">
        <label class="form-label font-weight-bold">Hora</label>
        <input
          type="time"
          class="form-control"
          [(ngModel)]="sesion.scheduledTime"
          name="scheduledTime"
          required
        />
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label font-weight-bold">Modalidad</label>
      <select
        class="form-select"
        [(ngModel)]="sesion.modality"
        name="modality"
      >
        <option value="Virtual">Virtual</option>
        <option value="Presencial">Presencial</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label font-weight-bold">Enlace de la Reunión</label>
      <input
        type="url"
        class="form-control"
        placeholder="https://..."
        [(ngModel)]="sesion.meetingLink"
        name="meetingLink"
      />
    </div>

    <div class="mb-3">
      <label class="form-label font-weight-bold">Notas o Agenda Previas</label>
      <textarea
        class="form-control"
        rows="3"
        placeholder="Puntos clave a tratar..."
        [(ngModel)]="sesion.sessionNotes"
        name="sessionNotes">
      </textarea>
    </div>

    <button type="submit" class="btn btn-success px-4">
      Confirmar y Agendar
    </button>
  </form>
</div>
