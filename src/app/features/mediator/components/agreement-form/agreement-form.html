<div class="card p-4 bg-light">
  <h4 class="mb-3 text-secondary">Registrar Resolución y Acuerdo</h4>

  <form (ngSubmit)="guardarAcuerdo()">
    <div class="mb-3">
      <label class="form-label font-weight-bold">Texto del Acuerdo</label>
      <textarea
        class="form-control"
        rows="4"
        placeholder="Describe el acuerdo alcanzado entre las partes..."
        [(ngModel)]="acuerdo.agreementText"
        name="agreementText"
        required>
      </textarea>
    </div>

    <div class="mb-3">
      <label class="form-label font-weight-bold">Punto o Compromiso</label>
      <textarea
        class="form-control"
        rows="3"
        placeholder="Ejemplo: La parte denunciada se compromete a..."
        [(ngModel)]="acuerdo.points"
        name="points"
        required>
      </textarea>
    </div>

    <button type="submit" class="btn btn-primary px-4">
      Guardar Acta de Acuerdo
    </button>
  </form>
</div>
