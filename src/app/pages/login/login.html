<div class="app-layout">
  <div class="bg-shapes">
    <div class="shape-circle-1"></div>
    <div class="shape-circle-2"></div>
  </div>

  <div class="glass-container">
    <div class="auth-card">
      <div style="display: flex; justify-content: center; margin-bottom: 10px;">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="15" r="8" fill="#F2C14E"/>
          <circle cx="20" cy="25" r="8" fill="#F2C14E" fill-opacity="0.7"/>
        </svg>
      </div>

      <h2>Iniciar Sesión</h2>

      <div class="form-group">
        <label for="email">Email</label>
        <input 
          id="email"
          type="email" 
          [(ngModel)]="email" 
          class="form-input" 
          placeholder="juan@test.com"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          id="password"
          type="password" 
          [(ngModel)]="password" 
          class="form-input" 
          placeholder="••••••••"
          required
        />
      </div>

      @if (errorMessage) {
        <p class="error-text">{{ errorMessage }}</p>
      }

      <button class="btn-primary" (click)="onLogin()" [disabled]="isLoading">
        {{ isLoading ? 'Entrando...' : 'Entrar' }}
      </button>

      <a routerLink="/register" class="auth-link">¿No tienes cuenta? Regístrate</a>
    </div>
  </div>
</div>
